    function toIso(d) { return d.toISOString().split("T")[0]; }
    function fmtShort(iso) {
      const d = new Date(iso + "T12:00:00");
      return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    }
    function fmtDateOnly(iso) {
      const d = new Date(iso + "T12:00:00");
      return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    }
    function fmtWeekday(iso) {
      const d = new Date(iso + "T12:00:00");

    function getRollingWeeks() {
      const today = new Date(); today.setHours(0,0,0,0);
      const start = new Date(today);
      start.setDate(today.getDate() - today.getDay()); // back to Sunday
      const weeks = [];
      for (let w = 0; w < 4; w++) {
        const week = [];
        for (let d = 0; d < 7; d++) {
          const dt = new Date(start);
          dt.setDate(start.getDate() + w*7 + d);
          week.push(dt);
        }
        weeks.push(week);
      }
      return weeks;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // LEGACY: weekend dates for old signup/randos/tally
    // ─────────────────────────────────────────────────────────────────────────
    function getWeekendDates() {
      const now = new Date();
      const day = now.getDay();
      let diffToSat;
      if (day === 6) diffToSat = 0;
      else if (day === 0) diffToSat = -1;
      else if (day === 5) diffToSat = 1;
      else diffToSat = (6 - day + 7) % 7;
      const w1sat = new Date(now); w1sat.setDate(now.getDate() + diffToSat);
      const dates = {};
      const offsets = { fri1:-1, sat:0, sun:1, mon1:2, fri2:6, fri:7, mon:8, mon2:9 };
      const fmtFull = (d) => d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
      const fmtDay  = (d) => String(d.getDate());
      const fmtMon  = (d) => d.toLocaleDateString("en-US", { month:"short" });
      Object.entries(offsets).forEach(([k,o]) => {
        const d = new Date(w1sat); d.setDate(w1sat.getDate() + o);
        dates[k] = { full: fmtFull(d), day: fmtDay(d), mon: fmtMon(d), date: d };
      });
      const key = `${w1sat.getFullYear()}-${w1sat.getMonth()}-${w1sat.getDate()}`;
      return { dates, key };
    }

    function chunkEvenly(arr) {
      if (!arr.length) return [];
      const n = arr.length;
      const numGroups = Math.ceil(n / 4);
      const base = Math.floor(n / numGroups);
      const remainder = n % numGroups;
      const groups = [];
      let idx = 0;
      for (let g = 0; g < numGroups; g++) {
        const size = base + (g < remainder ? 1 : 0);
        groups.push(arr.slice(idx, idx + size));
        idx += size;
      }
      return groups;
    }

    function compressImage(file, maxW = 800) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(1, maxW / img.width);
            const canvas = document.createElement("canvas");
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.65));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function dbSet(key, value) {
      key = clubKey(key);

    }
    function dbListen(key, cb) {
      key = clubKey(key);
      const ch = sb.channel("store-" + CLUB_ID + "-" + key)
        .on("postgres_changes", { event: "*", schema: "public", table: "store", filter: `key=eq.${key}` },
          payload => {
            if (payload.new?.club_id && payload.new.club_id !== CLUB_ID) return;
            cb(payload.new?.value ?? null);
          })
        .subscribe();
      return () => sb.removeChannel(ch);
    }

    // STEP 1 — 4-week rolling calendar
    function WizardStep1({ onNext, isSubscriber }) {
      const [selected, setSelected] = useState(new Set());
      const weeks = getRollingWeeks();
      const today = new Date(); today.setHours(0,0,0,0);

      const toggle = (iso, date) => {
        const isWE = date.getDay()===0||date.getDay()===6;
        if (date < today) return;
        if (!isSubscriber && !isWE) return;
        setSelected(prev => { const n = new Set(prev); n.has(iso)?n.delete(iso):n.add(iso); return n; });
      };

      const allDates = weeks.flat();
      const months = [...new Set(allDates.map(d => d.toLocaleString("default",{month:"long"})))];

      return (
        <div>
          <div style={{ marginBottom:16 }}>

          {/* Day headers */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:4 }}>
            {DAY_ABBR.map((d,i) => (
              <div key={d} style={{
                textAlign:"center", fontSize:9, fontWeight:700, letterSpacing:"0.5px",
                color:(i===0||i===6)?"rgba(212,175,55,0.7)":"rgba(240,234,214,0.2)", paddingBottom:2
              }}>{d}</div>
            ))}
          </div>

          {/* Calendar */}
          <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
            {weeks.map((week, wi) => (
              <div key={wi} style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
                {week.map((date, di) => {
                  const iso   = toIso(date);
                  const isPast = date < today;
                  const isSel  = selected.has(iso);
                  const isWE   = di===0||di===6;
                  const isLock = !isSubscriber && !isWE && !isPast;
                  const isToday= date.getTime()===today.getTime();

                  let bg="rgba(0,0,0,0.25)", color="rgba(240,234,214,0.25)";
                  let border="1px solid rgba(255,255,255,0.06)", cursor="pointer", opacity=1;
                  let shadow="none";

                  if (isPast)       { bg="rgba(0,0,0,0.15)"; color="rgba(240,234,214,0.1)"; border="1px solid rgba(255,255,255,0.03)"; cursor="default"; opacity=0.5; }
                  else if (isLock)  { bg="rgba(0,0,0,0.2)"; color="rgba(240,234,214,0.15)"; border="1px dashed rgba(255,255,255,0.08)"; cursor="not-allowed"; opacity=0.55; }
                  else if (isSel)   { bg="rgba(212,175,55,0.25)"; color="#d4af37"; border="1.5px solid #d4af37"; shadow="0 0 8px rgba(212,175,55,0.25)"; }
                  else if (isToday) { border="1px solid rgba(212,175,55,0.4)"; color="rgba(240,234,214,0.7)"; }
                  else if (isWE)    { bg="rgba(255,255,255,0.06)"; color="rgba(240,234,214,0.75)"; border="1px solid rgba(255,255,255,0.1)"; }

                  return (
                    <button key={iso} onClick={() => toggle(iso, date)} style={{
                      aspectRatio:"1", border, borderRadius:7, background:bg, color,
                      fontWeight:isSel?800:isWE?600:400, fontSize:12, cursor,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      padding:0, opacity, boxShadow:shadow, transition:"all 0.15s",
                      position:"relative", fontFamily:"Georgia,serif"
                    }}>
                      {date.getDate()}
                      {isLock && !isPast && <span style={{ position:"absolute", top:1, right:2, fontSize:7, opacity:0.5 }}>🔒</span>}
                    </button>
                  );
                })}
              </div>
            ))}
          </div>

          {/* Pro upsell */}

          setLoading(false);

          // ── Weather fetch: Open-Meteo, 16 days, index by ISO date ──
          try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.weatherLat}&longitude=${CONFIG.weatherLon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=${encodeURIComponent(CONFIG.timezone)}&forecast_days=16`);
            const wdata = await res.json();
            function wCode(code) {
              if (code===0) return "☀️"; if (code<=2) return "⛅"; if (code<=3) return "☁️";
              if (code<=49) return "🌫️"; if (code<=69) return "🌧️"; if (code<=79) return "❄️";
              if (code<=84) return "🌦️"; if (code<=99) return "⛈️"; return "🌤️";
            }
            // v2: index by ISO date string
            const byDate = {};
            (wdata.daily.time||[]).forEach((dateStr, i) => {
              byDate[dateStr] = {
                icon: wCode(wdata.daily.weathercode[i]),
                hi:   Math.round(wdata.daily.temperature_2m_max[i]),
                lo:   Math.round(wdata.daily.temperature_2m_min[i]),
                rain: wdata.daily.precipitation_probability_max[i]
              };
            });
            setWeatherByDate(byDate);

            // legacy day-key weather (for old signup view)
            const today2 = new Date();
            const td = today2.getDay();
            const dSat = td===6?0:(6-td+7)%7||7;
            function wd(i) { const idx=Math.max(0,i); return idx<wdata.daily.weathercode.length?{icon:wCode(wdata.daily.weathercode[idx]),hi:Math.round(wdata.daily.temperature_2m_max[idx]),rain:wdata.daily.precipitation_probability_max[idx]}:null; }
            const offsets = { fri1:-1, sat:0, sun:1, mon1:2, fri2:6, fri:7, mon:8, mon2:9 };
            const w = {};
            Object.entries(offsets).forEach(([k,o]) => { w[k] = wd(dSat+o); });
            setWeather(w);
          } catch(e) {}
        }
        init();
        const unsubs = [
          dbListen("players",            v => v && setPlayers(v)),
          dbListen(`signups-${weekKey}`, v => setSignups(v||{})),
          dbListen(`order-${weekKey}`,   v => setGroupOrder(v||{sat:[],sun:[]})),
          dbListen("photos-all",         v => { if(!deletingRef.current) setPhotos(v||[]); }),
          dbListen("bunker-all",         v => { if(!deletingRef.current) setBunkerPhotos(v||[]); }),
          dbListen("ace-all",            v => { if(!deletingRef.current) setAcePhotos(v||[]); }),
          dbListen("passwords",          v => v && setPasswords(v)),

          dbListen(`guests-${weekKey}`,  v => setGuestPlayers(v||[])),

          dbListen("v2-courses",         v => v && setV2Courses(v)),
          dbListen("handicaps",          v => v && setHandicaps(v)),
        ];
        return () => unsubs.forEach(u => u());
      }, [weekKey]);

      // ── v2 wizard submit ──
      async function handleWizardSubmit(course) {
        const today = new Date(); today.setHours(0,0,0,0);
        // Merge into v2-signups
        const nextSignups = { ...v2Signups };
        const nextCourses = { ...v2Courses };
        wizardDates.forEach(iso => {
          const existing = nextSignups[iso] || [];
          const merged = [...new Set([...existing, ...wizardGolfers])];
          nextSignups[iso] = merged;
          if (course) nextCourses[iso] = course;
        });
        // Remove dates older than today
        Object.keys(nextSignups).forEach(iso => {
          if (new Date(iso + "T12:00:00") < today) delete nextSignups[iso];
        });
        setV2Signups(nextSignups);
        setV2Courses(nextCourses);
        await dbSet("v2-signups", nextSignups);
        await dbSet("v2-courses", nextCourses);
      }

      async function toggleDay(day) {
        const next = { ...activeDays, [day]: !activeDays[day] };
        setActiveDays(next);
        await dbSet(`activeDays-${weekKey}`, next);
      }

      async function addGuest(name, day) {
        const nextGuests = [...guestPlayers, name];
        setGuestPlayers(nextGuests);
        await dbSet(`guests-${weekKey}`, nextGuests);
        await toggle(name, day);
      }

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      async function toggle(name, day) {
        const cur    = signups[name] || {};
        const wasIn  = !!cur[day];
        const nextSignups = { ...signups, [name]: { ...cur, [day]: !wasIn } };
        setSignups(nextSignups);
        const curOrder = groupOrder[day] || [];
        let nextOrder;
        if (wasIn) { nextOrder = shuffle(curOrder.filter(n => n !== name)); }
        else       { nextOrder = shuffle([...curOrder, name]); }
        setGroupOrder(prev => ({ ...prev, [day]: nextOrder }));
        setFlash(name+day); setTimeout(()=>setFlash(null),700);
        await dbSet(`signups-${weekKey}`, nextSignups);
        await dbSet(`order-${weekKey}`, { ...groupOrder, [day]: nextOrder });
      }

      async function uploadPhoto(file, wall, nameOverride, capOverride) {
        if (!file) return;
        setUploading(true);
        try {
          const dataUrl = await compressImage(file);
          const keyMap    = { pics:"photos-all", bunker:"bunker-all", ace:"ace-all" };
          const setterMap = { pics:setPhotos, bunker:setBunkerPhotos, ace:setAcePhotos };
          const key = keyMap[wall]; const setter = setterMap[wall];
          const latest = await dbGet(key) || [];
          const photo = { id:Date.now(), dataUrl, caption:(capOverride??"")?.trim()||"", uploader:"", ts:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) };
          const next = [photo, ...latest];
          setter(next); await dbSet(key, next);
        } catch(e) { console.error(e); }

        const maps = {
          pics:   { setter:setPhotos,       key:"photos-all" },
          bunker: { setter:setBunkerPhotos, key:"bunker-all" },
          ace:    { setter:setAcePhotos,    key:"ace-all"    },
        };
        const { setter, key } = maps[wall];
        deletingRef.current = true;
        const fresh = (await dbGet(key)) || [];
        const next = fresh.filter(p => p.id !== id);
        setter(next); setLightboxList(next);
        if (next.length === 0) { setLightbox(null); }
        else {
          const oldIdx = fresh.findIndex(p=>p.id===id);
          const newIdx = Math.min(oldIdx, next.length - 1);
          setLightbox({...next[newIdx], wall});
        }
        await dbSet(key, next);
        setTimeout(() => { deletingRef.current = false; }, 500);
      }

        const next = { ...handicaps };
        if (isNaN(hc) || val === "") { delete next[name]; }

      // ── Snake draft — balanced by HC ──
      // Sorts low→high, distributes in snake order so each group gets
      // one low, one-two mid, one high. Net HC per group roughly equal.
      function buildHCGroups(playerList) {
        if (!playerList.length) return [];
        const sorted = [...playerList].sort((a, b) => (handicaps[a]??20) - (handicaps[b]??20));
        const numGroups = Math.ceil(sorted.length / 4);
        const groups = Array.from({ length: numGroups }, () => []);
        sorted.forEach((player, i) => {
          const round    = Math.floor(i / numGroups);
          const pos      = i % numGroups;
          const groupIdx = round % 2 === 0 ? pos : numGroups - 1 - pos;
          groups[groupIdx].push(player);
        });
        return groups;
      }

              return <button key={v} style={{...C.navBtn(view===v,i===ROW2.length-1),opacity:locked?0.6:1}} onClick={()=>locked?setUpsell({title:TAB_LABEL[v]||l}):setView(v)}>{l}{locked?' [+]':''}</button>;
            })}</div>
          </div>

          <div style={C.body}>

            {/* ══════════════════════════════════════════════════
                SIGN UP — v2 three-step wizard
            ══════════════════════════════════════════════════ */}
            {view==="signup"&&(
              <div>
                <WizardStepBar step={wizardStep}/>
                {wizardStep===1 && (
                  <WizardStep1
                    isSubscriber={FEAT.extendedDays}
                    onNext={dates => { setWizardDates(dates); setWizardStep(2); }}
                  />
                )}
                {wizardStep===2 && (
                  <WizardStep2
                    dates={wizardDates}
                    players={allPlayers}
                    handicaps={handicaps}
                    onUpdateHC={updateHandicap}
                    onNext={golfers => { setWizardGolfers(golfers); setWizardStep(3); }}
                    onBack={() => setWizardStep(1)}
                  />
                )}
                {wizardStep===3 && (
                  <WizardStep3
                    dates={wizardDates}
                    golfers={wizardGolfers}
                    onBack={() => setWizardStep(2)}
                    onSubmit={async (course) => {
                      await handleWizardSubmit(course);
                      // Auto-navigate to Who's In after 1.5s
                      setTimeout(() => {
                        setView("tally");
                        setWizardStep(1);
                        setWizardDates([]);
                        setWizardGolfers([]);
                      }, 1500);
                    }}
                  />
                )}
                <div style={{textAlign:"center",marginTop:20}}>
                  <button style={{background:"none",border:"none",color:"rgba(240,234,214,.1)",fontSize:10,cursor:"pointer",fontFamily:"Georgia,serif",letterSpacing:1}} onClick={()=>setView("admin")}>admin</button>
                </div>
              </div>
            )}

            {/* ══════════════════════════════════════════════════
                WHO'S IN — v2 with course + weather header
            ══════════════════════════════════════════════════ */}
            {view==="tally"&&(
              <div>
                <div style={{ fontSize:11, color:"rgba(212,175,55,0.6)", letterSpacing:2, textTransform:"uppercase", textAlign:"center", marginBottom:14 }}>
                  {CONFIG.cityLabel||""}
                </div>
                {renderV2WhoIsIn()}
                {adminUnlocked && (
                  <button onClick={async()=>{
                    if(!window.confirm("Clear all upcoming rounds?")) return;
                    setV2Signups({}); setV2Courses({});
                    await dbSet("v2-signups",{}); await dbSet("v2-courses",{});
                  }} style={{...C.addBtn,marginTop:8,color:"rgba(224,92,92,.7)",borderColor:"rgba(224,92,92,.3)"}}>
                    Clear All Rounds (Admin)
                  </button>
                )}
              </div>
            )}

            {/* ══════════════════════════════════════════════════
                RANDOS — unchanged (uses legacy signups)
            ══════════════════════════════════════════════════ */}
            {view==="groups"&&(()=>{
              if (!FEAT.randos) return null;
              const activeGroupPw = passwords.groupPw || CONFIG.groupPw || "";
              if (activeGroupPw && !groupUnlocked) return (
                <div style={C.lockBox}>
                  <div style={{fontSize:32,marginBottom:12}}>🔒</div>
                  <div style={{fontSize:16,fontWeight:"bold",color:"#f0ead6",marginBottom:8}}>Members Only</div>
                  <input style={{...C.input,textAlign:"center",marginBottom:8}} type="password" placeholder="Group code" value={groupPwInput} onChange={e=>{setGroupPwInput(e.target.value);setGroupPwError(false);}} onKeyDown={e=>e.key==="Enter"&&handleGroupLogin()}/>
                  {groupPwError&&<div style={{color:"#e05c5c",fontSize:13,marginBottom:8}}>Wrong code</div>}
                  <button style={{...C.addBtn}} onClick={handleGroupLogin}>Enter</button>
                </div>
              );
              const allDayKeysG=['fri1','sat','sun','mon1','fri2','fri','mon','mon2'];
              const alwaysOnG=['sat','sun','fri','mon'];
              const playDays=allDayKeysG.filter(k=>alwaysOnG.includes(k)||activeDays[k]);
              return (
                <div>
                  {/* Algorithm note */}
                  <div style={{
                    background:"rgba(0,0,0,0.2)", border:"1px solid rgba(212,175,55,0.18)",
                    borderRadius:9, padding:"10px 13px", marginBottom:16
                  }}>
                    <div style={{ fontSize:11, color:"rgba(212,175,55,0.8)", fontWeight:"bold", marginBottom:3 }}>
                      ⚙️ How groups are built
                    </div>
                    <div style={{ fontSize:11, color:"rgba(240,234,214,0.5)", lineHeight:1.6 }}>
                      Groups are balanced using an optimized algorithm that distributes players by handicap so each group has a comparable mix — one low, one-two mid, one high.
                    </div>
                    <div style={{ fontSize:10, color:"rgba(240,234,214,0.3)", marginTop:5, fontStyle:"italic" }}>
                      Handicaps shown are general index, not adjusted for course or tee selection.
                    </div>
                  </div>
                  {playDays.map(day => {
                    const allP=[...players,...guestPlayers];
                    const ins=allP.filter(p=>signups[p]?.[day]);
                    const groups=buildHCGroups(ins);
                    const prefix=day==='fri1'||day==='fri2'?'FRI':day==='sat'||day==='fri'?'SAT':day==='sun'||day==='mon'?'SUN':'MON';
                    const label=`${prefix} ${D[day]?.mon} ${D[day]?.day}`;
                    return (
                      <div key={day} style={C.dSec}>
                        <div style={C.dTitle}>{label} — {ins.length} golfer{ins.length!==1?"s":""}</div>
                        {groups.length===0
                          ? <div style={{color:"rgba(240,234,214,.3)",fontSize:13,fontStyle:"italic",textAlign:"center",padding:"20px 0"}}>No signups yet for {label}</div>
                          : groups.map((group,gi)=>{
                              const slots=[...group,...Array(4-group.length).fill(null)];
                              const groupHC = group.filter(p=>handicaps[p]!==undefined);
                              const avgHC = groupHC.length ? Math.round(groupHC.reduce((s,p)=>s+(handicaps[p]??0),0)/groupHC.length) : null;
                              return (
                                <div key={gi} style={C.gCard(gi)}>
                                  <div style={C.gTitle(gi)}>
                                    Group {gi+1}
                                    {group.length<4&&<span style={C.forming}>Forming...</span>}
                                    {avgHC!==null&&<span style={{fontSize:9,color:"rgba(212,175,55,0.4)",fontWeight:"normal",marginLeft:"auto"}}>avg HC {avgHC}</span>}
                                  </div>
                                  {slots.map((p,si)=>(
                                    <div key={si} style={C.slot(!!p)}>
                                      <div style={C.dot(!!p,gi)}/>
                                      <span style={{flex:1}}>{p||"—"}</span>
                                      {p && handicaps[p]!==undefined && <span style={{fontSize:10,color:"rgba(212,175,55,0.35)"}}>HC {handicaps[p]}</span>}
                                    </div>
                                  ))}
                                </div>
                              );
                            })
                        }
                      </div>
                    );
                  })}
                  {adminUnlocked&&<button onClick={()=>{
                    // Re-run HC groups for all days
                    const allDK=['fri1','sat','sun','mon1','fri2','fri','mon','mon2'].filter(k=>['sat','sun','fri','mon'].includes(k)||activeDays[k]);
                    const newOrder={};
                    allDK.forEach(day=>{
                      const allP=[...players,...guestPlayers];
                      const ins=allP.filter(p=>signups[p]?.[day]);
                      const groups=buildHCGroups(ins);
                      newOrder[day]=groups.flat();
                    });
                    setGroupOrder(newOrder);
                    dbSet(`order-${weekKey}`,newOrder);
                  }} style={{...C.addBtn}}>⚙️ Re-balance Groups</button>}
                </div>
              );
            })()}

            {/* ══════════════════════════════════════════════════
                PHOTOS
            ══════════════════════════════════════════════════ */}
            {view==="photos"&&(FEAT.photos
              ? <PhotoWall wallPhotos={photos} wallKey="pics" uploaderVal={uploaderName} setUploaderVal={setUploaderName} captionVal={caption} setCaptionVal={setCaption} fileInputRef={fileRef} multi={true}/>
              : <div style={C.lockBox}><div style={{fontSize:32,marginBottom:8}}>📷</div><div style={{color:"rgba(240,234,214,.4)"}}>Photos are a premium feature.</div></div>
            )}

            {/* ══════════════════════════════════════════════════
                BUNKER
            ══════════════════════════════════════════════════ */}
            {view==="bunker"&&(FEAT.bunker
              ? <><div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:20,fontWeight:"bold",color:"#d4af37"}}>{CONFIG.bunkerName}</div>{CONFIG.bunkerTagline&&<div style={{fontSize:12,color:"rgba(240,234,214,.5)",marginTop:4}}>{CONFIG.bunkerTagline}</div>}</div><PhotoWall wallPhotos={bunkerPhotos} wallKey="bunker" uploaderVal={bunkerUploader} setUploaderVal={setBunkerUploader} captionVal={bunkerCaption} setCaptionVal={setBunkerCaption} fileInputRef={bunkerRef} accent="#7ec8a0"/></>
              : <div style={C.lockBox}><div style={{fontSize:32,marginBottom:8}}>🐪</div><div style={{color:"rgba(240,234,214,.4)"}}>The Bunker is a premium feature.</div></div>
            )}

            {/* ══════════════════════════════════════════════════
                ACE WALL
            ══════════════════════════════════════════════════ */}
            {view==="ace"&&(()=>{
              if (!FEAT.aceWall) return <div style={C.lockBox}><div style={{fontSize:32,marginBottom:8}}>🏆</div><div style={{color:"rgba(240,234,214,.4)"}}>Ace Wall is a premium feature.</div></div>;
              if (!aceUnlocked) return (
                <div style={C.lockBox}>
                  <div style={{fontSize:32,marginBottom:12}}>🏆</div>
                  <div style={{fontSize:16,fontWeight:"bold",color:"#f0ead6",marginBottom:16}}>Hole in One Wall</div>
                  <input style={{...C.input,textAlign:"center",marginBottom:8}} type="password" placeholder="Ace password" value={acePwInput} onChange={e=>{setAcePwInput(e.target.value);setAcePwError(false);}} onKeyDown={e=>e.key==="Enter"&&handleAceLogin()}/>
                  {acePwError&&<div style={{color:"#e05c5c",fontSize:13,marginBottom:8}}>Wrong password</div>}
                  <button style={{...C.addBtn}} onClick={handleAceLogin}>Enter</button>
                </div>
              );
              return <PhotoWall wallPhotos={acePhotos} wallKey="ace" uploaderVal={aceUploader} setUploaderVal={setAceUploader} captionVal={aceCaption} setCaptionVal={setAceCaption} fileInputRef={aceRef} accent="#d4af37"/>;
            })()}

            {/* ══════════════════════════════════════════════════
                ADMIN
            ══════════════════════════════════════════════════ */}
            {view==="admin"&&(()=>{
              if (!FEAT.adminAccess) return <div style={C.lockBox}><div style={{color:"rgba(240,234,214,.4)"}}>Admin is a premium feature.</div></div>;
              if (!adminUnlocked) return (
                <div style={C.lockBox}>
                  <div style={{fontSize:32,marginBottom:12}}>⚙️</div>
                  <input style={{...C.input,textAlign:"center",marginBottom:8}} type="password" placeholder="Admin password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwError(false);}} onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()}/>
                  {pwError&&<div style={{color:"#e05c5c",fontSize:13,marginBottom:8}}>Wrong password</div>}
                  <button style={{...C.addBtn}} onClick={handleAdminLogin}>Enter</button>
                </div>
              );
              return (
                <div>
                  <div style={C.label}>Handicaps</div>
                  <div style={{ fontSize:10, color:"rgba(240,234,214,0.3)", marginBottom:8, lineHeight:1.5 }}>
                    Set general index handicaps for each player. These are used to balance Randos groups. Not adjusted for course or tees.
                  </div>
                  {players.map(name => (
                    <div key={name} style={{...C.aRow}}>
                      <div style={{ flex:1, fontSize:14 }}>{name}</div>
                      <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                        <span style={{ fontSize:10, color:"rgba(212,175,55,0.4)", letterSpacing:"0.5px" }}>HC</span>
                        <input
                          type="number" min="0" max="54"
                          defaultValue={handicaps[name]??""}
                          placeholder="—"
                          onBlur={e => updateHandicap(name, e.target.value)}
                          style={{
                            width:46, height:28, borderRadius:6,
                            border:"1px solid rgba(212,175,55,0.3)",
                            background:"rgba(0,0,0,0.3)", color:"#d4af37",
                            fontFamily:"Georgia,serif", fontSize:13, fontWeight:"bold",
                            textAlign:"center", outline:"none", padding:0
                          }}
                        />
                      </div>
                    </div>
                  ))}
                  <div style={C.label}>Manage Roster</div>
                  {players.map((name,i)=>(
                    <div key={i} style={C.aRow}>
                      {editIdx===i
                        ? <><input style={{...C.input,flex:1,padding:"6px 10px",fontSize:14}} value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit(i)}/><button style={C.icon("#d4af37")} onClick={()=>saveEdit(i)}>✓</button><button style={C.icon()} onClick={()=>setEditIdx(null)}>✕</button></>
                        : <><div style={{flex:1,fontSize:15}}>{name}</div><button style={C.icon()} onClick={()=>{setEditIdx(i);setEditName(name);}}>✏️</button><button style={C.icon("#e05c5c")} onClick={()=>removePlayer(i)}>🗑</button></>
                      }
                    </div>
                  ))}
                  <div style={{display:"flex",gap:8,marginTop:8}}>
                    <input style={{...C.input,flex:1}} placeholder="Add player name" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPlayer()}/>
                    <button style={{...C.addBtn,marginTop:0,width:"auto",padding:"0 16px"}} onClick={addPlayer}>+</button>
                  </div>
                  <div style={C.label}>All-Time Rounds</div>
                  {Object.entries(allTimeRounds).sort(([,a],[,b])=>b-a).map(([name,rounds])=>(
                    <div key={name} style={C.aRow}>
                      <div style={{flex:1,fontSize:14}}>{name}</div>
                      {editingRounds===name
                        ? <><input style={{...C.input,width:60,padding:"4px 8px",fontSize:13,textAlign:"center"}} value={roundsInput} onChange={e=>setRoundsInput(e.target.value)} onKeyDown={async e=>{if(e.key==="Enter"){const v=parseInt(roundsInput);if(!isNaN(v)){const next={...allTimeRounds,[name]:v};setAllTimeRounds(next);await dbSet("allTimeRounds",next);}setEditingRounds(null);}}/><button style={C.icon()} onClick={()=>setEditingRounds(null)}>✕</button></>
                        : <><div style={{fontSize:14,color:"#d4af37",fontWeight:"bold",marginRight:8}}>{rounds}</div><button style={C.icon()} onClick={()=>{setEditingRounds(name);setRoundsInput(String(rounds));}}>✏️</button></>
                      }
                    </div>
                  ))}
                  <div style={C.label}>Change Passwords</div>
                  <input style={{...C.input,marginBottom:8}} type="password" placeholder={`Admin pw (current: ${passwords.admin})`} value={newAdminPw} onChange={e=>setNewAdminPw(e.target.value)}/>
                  <input style={{...C.input,marginBottom:8}} type="password" placeholder={`Ace pw (current: ${passwords.ace})`} value={newAcePw} onChange={e=>setNewAcePw(e.target.value)}/>
                  <input style={{...C.input,marginBottom:8}} type="password" placeholder={`Group code (current: ${passwords.groupPw||"none"})`} value={newGroupPw} onChange={e=>setNewGroupPw(e.target.value)}/>
                  <button style={C.addBtn} onClick={savePasswords}>Save Passwords</button>
                  {pwSaved&&<div style={{textAlign:"center",color:"#7ec8a0",fontSize:13,marginTop:8}}>{pwSaved}</div>}
                  <div style={C.label}>Danger Zone</div>
                  <button onClick={clearWeek} style={{...C.addBtn,color:"rgba(224,92,92,.7)",borderColor:"rgba(224,92,92,.3)"}}>Clear This Week (Legacy)</button>
                </div>
              );
            })()}

          </div>
        </div>

        {/* Upsell modal */}
        {upsell && (
          <div onClick={()=>setUpsell(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
            <div onClick={e=>e.stopPropagation()} style={{background:'#0d3d22',border:'2px solid #d4af37',borderRadius:20,padding:'36px 28px',maxWidth:320,width:'100%',textAlign:'center',fontFamily:'Georgia,serif',position:'relative'}}>
              <button onClick={()=>setUpsell(null)} style={{position:'absolute',top:12,right:16,background:'none',border:'none',color:'rgba(212,175,55,0.5)',fontSize:20,cursor:'pointer'}}>✕</button>
              <div style={{fontSize:48,marginBottom:12}}>⛳</div>
              <div style={{fontSize:18,fontWeight:'bold',color:'#f0ead6',marginBottom:8}}>{upsell.title}</div>
              <div style={{fontSize:14,color:'rgba(240,234,214,0.7)',marginBottom:24,lineHeight:1.6}}>
                This feature is available on the <strong style={{color:'#d4af37'}}>Sheet-Tee Premium Plan</strong>.
              </div>
              <a href={CONFIG.stripeUrl||'https://sheet-tee.com'} target="_blank" rel="noopener noreferrer" style={{display:'block',background:'#d4af37',color:'#0d3d22',padding:'13px 0',borderRadius:10,fontFamily:'Georgia,serif',fontSize:15,fontWeight:'bold',textDecoration:'none',marginBottom:12}}>Subscribe Now</a>
              <button onClick={()=>setUpsell(null)} style={{background:'none',border:'1px solid rgba(212,175,55,0.3)',color:'rgba(240,234,214,0.5)',padding:'10px 0',width:'100%',borderRadius:10,fontFamily:'Georgia,serif',fontSize:13,cursor:'pointer'}}>Maybe Later</button>
            </div>
          </div>
        )}

        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }

    // ── iOS Chrome Banner ──────────────────────────────────────
    (function() {
      var isIOS    = /iphone|ipad|ipod/i.test(navigator.userAgent);
      var isChrome = /CriOS/i.test(navigator.userAgent);
      if (!isIOS || !isChrome) return;
      window.addEventListener('DOMContentLoaded', function() {
        var banner = document.createElement('div');
        banner.style.cssText = ['position:fixed;top:0;left:0;right:0;z-index:10000;','background:#d4af37;color:#0d3d22;','padding:10px 16px;','font-family:Georgia,serif;font-size:13px;','display:flex;align-items:center;justify-content:space-between;gap:12px;','box-shadow:0 2px 8px rgba(0,0,0,0.3);'].join('');
        banner.innerHTML = ['<span>','<strong>📱 Tip:</strong> For the best experience & to add this app to your Home Screen, ','open this page in <strong>Safari</strong>.','</span>','<button id="ios-banner-x" style="background:none;border:none;color:#0d3d22;font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;">✕</button>'].join('');
        document.body.appendChild(banner);
        document.getElementById('ios-banner-x').onclick = function() { banner.remove(); };
      });
    })();

    // ── PWA Install Popup ──────────────────────────────────────
    (function() {
      var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
      if (isStandalone) return;
      var WEEK = 7 * 24 * 60 * 60 * 1000;
      var now  = Date.now();
      if (now - parseInt(localStorage.getItem('pwa-dismissed') || 0) < WEEK) return;
      if (now - parseInt(localStorage.getItem('pwa-shown')    || 0) < WEEK) return;
      localStorage.setItem('pwa-shown', now);
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
      var card = document.createElement('div');
      card.style.cssText = 'background:#1a3a2a;border:2px solid #d4af37;border-radius:20px;padding:32px 28px;max-width:320px;width:100%;text-align:center;font-family:Georgia,serif;position:relative;';
      card.innerHTML = [
        '<button id="pwa-x" style="position:absolute;top:12px;right:16px;background:none;border:none;color:rgba(212,175,55,0.5);font-size:20px;cursor:pointer;">&#x2715;</button>',
        '<img src="https://sheet-tee.github.io/sheet-tee-demo/golf-ball.png" style="width:130px;height:130px;object-fit:contain;margin-bottom:16px;display:block;margin-left:auto;margin-right:auto;"/>',
        '<div style="font-size:16px;font-weight:bold;color:#f0ead6;margin-bottom:20px;line-height:1.5;">For the best user experience,<br/>please add the app:</div>',
        '<div id="pwa-btns" style="display:flex;gap:12px;justify-content:center;margin-bottom:20px;">',
          '<button id="pwa-add" style="background:#d4af37;border:none;color:#0d3d22;padding:11px 24px;border-radius:8px;font-family:Georgia,serif;font-size:14px;font-weight:bold;cursor:pointer;">Add App</button>',
          '<button id="pwa-no"  style="background:none;border:1px solid rgba(212,175,55,0.4);color:rgba(240,234,214,0.6);padding:11px 24px;border-radius:8px;font-family:Georgia,serif;font-size:14px;cursor:pointer;">No</button>',
        '</div>',
        '<div style="font-size:18px;font-weight:bold;color:#d4af37;letter-spacing:2px;">SHEET-TEE</div>'
      ].join('');
      overlay.appendChild(card);
      document.body.appendChild(overlay);
      function dismiss() { localStorage.setItem('pwa-dismissed', Date.now()); overlay.remove(); }
      document.getElementById('pwa-x').onclick  = dismiss;
      document.getElementById('pwa-no').onclick  = dismiss;
      var deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault(); deferredPrompt = e; });
      document.getElementById('pwa-add').onclick = async function() {
        if (deferredPrompt) { deferredPrompt.prompt(); var result = await deferredPrompt.userChoice; deferredPrompt = null; dismiss(); }
        else {
          var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
          var html;
          if (isIOS) {
